name: ci

# Checks for pull requests and non-main branches. Pushes to main are checked by
# the release workflow (which also tags + publishes when the version is bumped),
# so main isn't duplicated here.
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun test
