name: release

# Releases are created by CI, never by hand. To ship: bump the version in
# src/version.ts and push to main. Tests run first; ONLY if they pass AND that
# version has no tag yet does CI create the vX.Y.Z tag and publish the release.
# So a release tag can only ever exist as the result of green CI.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      exists: ${{ steps.v.outputs.exists }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun test
      - id: v
        run: |
          set -eu
          version=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' src/version.ts | head -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v$version already released — nothing to do"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "v$version is new — will build + release"
          fi

  release:
    needs: test
    if: needs.test.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      # Bun cross-compiles all targets from one runner. Trim this list if you
      # only need your own platform.
      - name: Build binaries
        run: |
          set -eu
          build() {
            bun build src/cli.tsx --compile --target="$1" --outfile "$2"
            sha256sum "$2" > "$2.sha256"
          }
          build bun-linux-x64     komodo-linux-x64
          build bun-linux-arm64   komodo-linux-arm64
          build bun-darwin-x64    komodo-darwin-x64
          build bun-darwin-arm64  komodo-darwin-arm64

      - name: Create tag + publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.test.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: komodo-*
          generate_release_notes: true
